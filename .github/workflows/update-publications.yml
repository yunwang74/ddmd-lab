name: Update Publications from ORCID

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - publications.html

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run updater
        run: python3 scripts/update_publications.py

      - name: Commit changes if publications changed
        run: |
          if ! git diff --quiet -- publications.html; then
            git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add publications.html
            git commit -m "Auto-update publications from ORCID"
            git push origin HEAD:main
          else
            echo "No changes to publications.html"
          fi
